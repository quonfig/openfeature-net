name: Release

# Tag-triggered: pushing a tag like v0.0.1 publishes that exact ref to
# nuget.org via OIDC Trusted Publishing. No tag = no publish. Mirrors the
# sdk-net release workflow (single package here).
#
#   1. `test` job — runs the full suite on the TAGGED commit so a red test
#      on the tag blocks publish.
#   2. `publish` job — needs: test. Verifies the tag matches
#      Directory.Build.props <Version>, packs Quonfig.OpenFeature.ServerProvider,
#      exchanges the GitHub OIDC token for a short-lived NuGet API key (no
#      long-lived secret), pushes the package, and creates the GitHub Release
#      from the matching CHANGELOG section.

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test on tagged commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout openfeature-net at tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          path: openfeature-net

      - name: Checkout integration-test-data
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          ref: v2026.05.20

      - name: Setup .NET 8
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25  # v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        working-directory: openfeature-net
        run: dotnet restore

      - name: Test
        working-directory: openfeature-net
        run: dotnet test --configuration Release

  publish:
    runs-on: ubuntu-latest
    needs: test
    environment: release

    permissions:
      contents: write
      id-token: write   # OIDC token exchange for NuGet Trusted Publishing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          path: openfeature-net
          persist-credentials: false

      - uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25  # v4
        with:
          dotnet-version: 8.0.x

      - name: Verify tag matches Directory.Build.props <Version>
        working-directory: openfeature-net
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          props_version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' Directory.Build.props | head -n1)"
          echo "tag=${tag_version} props=${props_version}"
          if [ "$tag_version" != "$props_version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match Directory.Build.props <Version>=${props_version}"
            exit 1
          fi

      - name: Restore
        working-directory: openfeature-net
        run: dotnet restore

      - name: Pack
        working-directory: openfeature-net
        run: |
          set -euo pipefail
          mkdir -p artifacts
          dotnet pack src/Quonfig.OpenFeature.ServerProvider/Quonfig.OpenFeature.ServerProvider.csproj \
            --configuration Release \
            --no-restore \
            --output artifacts
          echo "Produced artifacts:"
          ls -1 artifacts

      - name: Login to NuGet via Trusted Publishing (OIDC)
        # The `user` input is the POLICY CREATOR's nuget.org username (the human
        # account signed in when the policy was made), NOT the Package Owner the
        # policy targets. One policy covers all packages owned by `quonfig`.
        # The OIDC step output is `NUGET_API_KEY` (not `nuget-api-key`).
        # See https://learn.microsoft.com/en-us/nuget/nuget-org/trusted-publishing
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: jeff-quonfig

      - name: Publish to nuget.org
        working-directory: openfeature-net
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          # --skip-duplicate makes re-runs of the same tag idempotent. A single push
          # covers the package and its sibling .snupkg.
          dotnet nuget push "artifacts/Quonfig.OpenFeature.ServerProvider.${tag_version}.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        working-directory: openfeature-net
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            notes=$(awk -v v="$version" '
              $0 ~ "^## " v " "{flag=1; next}
              /^## /{flag=0}
              flag
            ' CHANGELOG.md)
          else
            notes="Release ${GITHUB_REF_NAME}"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${notes:-Release ${GITHUB_REF_NAME}}" \
            --repo "${GITHUB_REPOSITORY}"
